[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gh-record"
version = "0.1.0"
description = "Generate a record of the popular projects a GitHub user maintains, steers, or authors standards for."
readme = "README.md"
requires-python = ">=3.13"
license = { text = "MIT" }
dependencies = []   # core runs on the stdlib; tomllib is built in on 3.11+

[project.optional-dependencies]
http = ["httpx>=0.27"]       # faster, connection-pooled HTTP client (falls back to urllib)
llm = ["anthropic>=0.40"]    # Claude fallback for ambiguous governance prose
yaml = ["pyyaml>=6"]         # k8s OWNERS files and YAML front-matter proposals
dev = ["pytest>=7"]

[project.scripts]
gh-record = "ghrecord.cli:main"

[tool.setuptools.packages.find]
include = ["ghrecord*"]

[tool.setuptools.package-data]
ghrecord = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
