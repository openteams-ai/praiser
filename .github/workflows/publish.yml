name: Publish to PyPI

# Builds the sdist + wheel and publishes them to PyPI when a GitHub Release is
# published. Uses PyPI Trusted Publishing (OIDC) — no API token/secret needed.
# One-time setup on PyPI: project → Publishing → add a trusted publisher with
# owner=openteams-ai, repo=praiser, workflow=publish.yml, environment=pypi.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # match the trusted-publisher environment on PyPI
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
